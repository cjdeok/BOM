<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BOM 전개 계산기</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --surface: #ffffff;
            --background: #F3F4F6;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            height: fit-content;
        }

        h2 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 9px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input.lot-input {
            padding: 5px 8px;
            border: 1px solid #d1d5db;
            background-color: #fffbeb; /* 입력 가능함을 나타내는 연한 배경색 */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .spinner {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .result-area {
            display: none;
        }

        .level-section {
            margin-bottom: 30px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .level-header {
            background-color: #F9FAFB;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-0-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 15px 16px;
            background-color: #EEF2FF;
            border-bottom: 1px solid var(--border);
        }

        .unit-small {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-left: 3px;
        }

        .info-item span {
            display: block;
            font-size: 0.75rem;
            color: #6366F1;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .info-item div {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: baseline;
            flex-wrap: nowrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        th {
            background-color: #fcfcfc;
            font-weight: 600;
            color: #4B5563;
        }

        .highlight {
            color: var(--primary);
            font-weight: 700;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>BOM 계산 설정</h2>
        <div class="form-group">
            <label>수식 마스터 파일 선택</label>
            <select id="formulaFileSelect"></select>
        </div>

        <div class="form-group">
            <label>생산량</label>
            <input type="number" id="targetQty" value="1000" />
        </div>

        <div class="form-group">
            <label>Lot No.</label>
            <input type="text" id="topLotNo" placeholder="예: LOT20260325" />
        </div>

        <div class="form-group">
            <label>제조일자</label>
            <input type="text" id="mfgDate" placeholder="예: 2026-03-25" />
        </div>

        <div class="form-group">
            <label>의뢰팀</label>
            <input type="text" id="requestTeam" placeholder="예: 생산1팀" />
        </div>

        <div class="form-group">
            <label>생산목적</label>
            <input type="text" id="purpose" placeholder="예: 정기 생산" />
        </div>

        <button onclick="calculateBOM()">BOM 전개 및 계산</button>
    </div>

    <div class="card" id="rightPanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border);">
            <h2 style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">전개 결과 (BOM Tree)</h2>
            <button id="downloadBtn" onclick="downloadExcel()" style="width: auto; padding: 6px 15px; font-size: 0.85rem; margin-top: 0; background-color: #10B981; display: none;">엑셀 다운로드</button>
        </div>
        <div id="spinner" class="spinner">계산 중...</div>
        
        <div id="resultArea" class="result-area">
            <!-- Level 0 Section -->
            <div class="level-section" style="border: 2px solid #6366F1;">
                <div class="level-header" style="background-color: #6366F1; color: white;">
                    Level 0 (최상위 제품 및 생산 정보)
                </div>
                <!-- 1st Row: Product Info -->
                <div class="level-0-info" id="level0Display" style="border-bottom: 1px solid #c7d2fe;">
                    <!-- Dynamic Content -->
                </div>
                <!-- 2nd Row: Production Info -->
                <div class="level-0-info" id="productionInfoDisplay" style="background-color: #f8faff;">
                    <!-- Dynamic Content -->
                </div>
            </div>

            <!-- Level 1, 2, 3 Tables -->
            <div id="tablesContainer"></div>
        </div>
        
        <div id="emptyState" style="text-align: center; color: var(--text-muted); padding: 80px 40px;">
            파일과 수량을 입력하고 버튼을 눌러주세요.
        </div>
    </div>
</div>

<script>
    // DOM이 완전히 로드된 후 실행
    document.addEventListener('DOMContentLoaded', function() {
        loadFormulaFiles();
    });

    function loadFormulaFiles() {
        const select = document.getElementById('formulaFileSelect');
        if (!select) return;

        select.innerHTML = '<option value="">불러오는 중...</option>';

        fetch('/api/lots')
            .then(res => res.json())
            .then(data => {
                select.innerHTML = '';
                if(data && data.length > 0) {
                    data.forEach((item, index) => {
                        const opt = document.createElement('option');
                        opt.value = item.filename;
                        opt.textContent = item.filename;
                        if (index === 0) opt.selected = true;
                        select.appendChild(opt);
                    });
                } else {
                    select.innerHTML = '<option value="">파일 없음</option>';
                }
            })
            .catch(err => {
                console.error("Error loading files:", err);
                select.innerHTML = '<option value="">로드 실패</option>';
            });
    }

    function calculateBOM() {
        const formulaFile = document.getElementById('formulaFileSelect').value;
        const targetQty = document.getElementById('targetQty').value;
        
        // 추가 정보 수집
        const extraData = {
            topLotNo: document.getElementById('topLotNo').value,
            mfgDate: document.getElementById('mfgDate').value,
            requestTeam: document.getElementById('requestTeam').value,
            purpose: document.getElementById('purpose').value
        };

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('spinner').style.display = 'block';

        fetch('/api/generate_bom', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ formula_file: formulaFile, target_qty: targetQty })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('spinner').style.display = 'none';
            if (data.error) { alert(data.error); return; }
            renderResults(data, extraData);
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';
        })
        .catch(err => {
            document.getElementById('spinner').style.display = 'none';
            alert("통신 오류가 발생했습니다.");
        });
        }

        function downloadExcel() {
        const formulaFile = document.getElementById('formulaFileSelect').value;

        // 1. 현재 화면의 모든 데이터 수집 (수기 입력 Lot No. 포함)
        const l0_container = document.getElementById('level0Display');
        const p0_container = document.getElementById('productionInfoDisplay');

        const level0 = {
            제품코드: l0_container.children[0].lastElementChild.innerText,
            제품명: l0_container.children[1].lastElementChild.innerText,
            생산수량: l0_container.children[3].lastElementChild.innerText.split('(')[0].replace(/,/g, ''),
            단위: l0_container.children[3].lastElementChild.innerText.includes('(') ? l0_container.children[3].lastElementChild.innerText.split('(')[1].replace(')', '') : '',
            topLotNo: p0_container.children[0].lastElementChild.innerText
        };

        const collectTableData = (tableId) => {
            const rows = [];
            const tbody = document.getElementById(tableId);
            if (!tbody) return rows;

            Array.from(tbody.children).forEach(tr => {
                const tds = tr.children;
                rows.push({
                    상위연결: tds[0].innerText,
                    구성품: tds[1].innerText,
                    CodeNo: tds[2].innerText,
                    LotNo: tds[3].querySelector('input').value, // 수기 입력값 수집
                    계산된_소요량: tds[4].innerText.replace(/,/g, ''),
                    단위: tds[5].innerText
                });
            });
            return rows;
        };

        const data = {
            level0: level0,
            level1: collectTableData('l1Table'),
            level2: collectTableData('l2Table'),
            level3: collectTableData('l3Table')
        };

        // 2. 서버로 전송 및 파일 다운로드
        fetch('/api/download_excel', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(res => {
            if (!res.ok) throw new Error("Excel generation failed");
            return res.blob();
        })
        .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `BOM_Export_${level0.제품코드}_${new Date().toISOString().slice(0,10)}.xlsx`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        })
        .catch(err => alert("엑셀 다운로드 중 오류가 발생했습니다: " + err.message));
        }

        function renderResults(data, extraData) {
    // Render Level 0 - 1st Row (Product)
    const l0 = data.level0;
    const unitLabel = l0.단위 ? `<span class="unit-small">(${l0.단위})</span>` : '';

    document.getElementById('level0Display').innerHTML = `
        <div class="info-item"><span>제품코드</span><div>${l0.CodeNo || '-'}</div></div>
        <div class="info-item"><span>제품명</span><div>${l0.구성품 || '-'}</div></div>
        <div class="info-item"><span>생산량 (Target)</span><div>${Number(l0.목표수량).toLocaleString()}${unitLabel}</div></div>
        <div class="info-item"><span>생산수량 (Actual)</span><div>${Number(l0.생산수량).toLocaleString()}${unitLabel}</div></div>
    `;

    // Render Level 0 - 2nd Row (Production Info)
    document.getElementById('productionInfoDisplay').innerHTML = `
        <div class="info-item"><span>Lot No.</span><div>${extraData.topLotNo || '-'}</div></div>
        <div class="info-item"><span>제조일자</span><div>${extraData.mfgDate || '-'}</div></div>
        <div class="info-item"><span>의뢰팀</span><div>${extraData.requestTeam || '-'}</div></div>
        <div class="info-item"><span>생산목적</span><div>${extraData.purpose || '-'}</div></div>
    `;

    // Render Tables 1, 2, 3
    const container = document.getElementById('tablesContainer');
    container.innerHTML = '';

        [
            { id: 'l1Table', title: 'Level 1 (포장/완제품)', items: data.level1 },
            { id: 'l2Table', title: 'Level 2 (반제품 제조)', items: data.level2 },
            { id: 'l3Table', title: 'Level 3 (하위 조제)', items: data.level3 }
        ].forEach(section => {
            if (section.items.length === 0) return;

            const div = document.createElement('div');
            div.className = 'level-section';
            
            let tableHtml = `
                <div class="level-header">${section.title} <span>${section.items.length} 항목</span></div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 15%;">상위 연결</th>
                            <th style="width: 30%;">구성품</th>
                            <th style="width: 15%;">Code No.</th>
                            <th style="width: 20%;">Lot No.</th>
                            <th style="width: 10%;">수량</th>
                            <th style="width: 10%;">단위</th>
                        </tr>
                    </thead>
                    <tbody id="${section.id}">
            `;

            section.items.forEach(item => {
                tableHtml += `
                    <tr>
                        <td title="${item.상위연결}">${item.상위연결}</td>
                        <td title="${item.구성품}">${item.구성품}</td>
                        <td>${item.CodeNo}</td>
                        <td><input type="text" class="lot-input" placeholder="입력..."></td>
                        <td class="highlight">${item.계산된_소요량.toLocaleString()}</td>
                        <td>${item.단위}</td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            div.innerHTML = tableHtml;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
